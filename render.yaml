services:
  - type: web
    name: ai-shield
    runtime: python
    plan: free
    buildCommand: python -m pip install --upgrade pip && pip install -r backend/requirements.txt
    startCommand: gunicorn backend.app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 180
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: AI_SHIELD_ENV
        value: production
      - key: AI_SHIELD_DEBUG
        value: false
      - key: AI_SHIELD_FAST_MODE
        value: true
      - key: AI_SHIELD_ANALYZE_STREAMING_VIDEO
        value: false
      - key: AI_SHIELD_NORMALIZE_LEGACY_REPORTS
        value: false
