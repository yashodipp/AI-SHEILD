<section class="assistant-card">
  <div class="assistant-header">
    <div>
      <p class="eyebrow">AI Agent</p>
      <h3>Result explainer</h3>
    </div>
    <span class="status-pill">Online</span>
  </div>
  <div class="chat-log" id="chatLog">
    <article class="chat-bubble assistant">
      Ask about uploads, scores, confidence, or report downloads.
    </article>
  </div>
  <form id="chatForm" class="chat-form">
    <input id="chatInput" type="text" placeholder="Type your question in English or Hindi" autocomplete="off" required>
    <button class="button primary" type="submit">Send</button>
  </form>
</section>
